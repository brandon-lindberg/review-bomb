name: Scheduled Jobs

on:
  schedule:
    # Core ingestion pipeline - every 12 hours
    - cron: '0 */12 * * *'
    # News sync - every 4 hours
    - cron: '0 */4 * * *'
    # News relink backfill (last 14 days) - weekly Tuesday
    - cron: '30 3 * * 2'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        type: choice
        options:
          - pipeline
          - news
          - news-backfill

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  ENVIRONMENT: production
  FRONTEND_REVALIDATE_URL: ${{ secrets.FRONTEND_REVALIDATE_URL }}
  FRONTEND_REVALIDATE_SECRET: ${{ secrets.FRONTEND_REVALIDATE_SECRET }}

jobs:
  pipeline:
    name: Core Ingestion Pipeline (12h)
    runs-on: ubuntu-latest
    concurrency:
      group: core-pipeline-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event.schedule == '0 */12 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'pipeline')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Validate OpenCritic API key
        run: |
          if [ -z "${RAPIDAPI_KEY}" ]; then
            echo "::error::RAPIDAPI_KEY secret is missing."
            exit 1
          fi
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run OpenCritic -> Match -> Steam -> Metacritic -> Disparity
        run: |
          set -euo pipefail
          python -u -m app sync --stale-pages 5 --review-refresh-days 14 --review-refresh-min-hours 6
          python -u -m app match --days 14
          python -u -m app steam --days 14
          python -u -m app metacritic --recent 14
          python -u -m app disparity --journalists --outlets
          python -u -m app disparity --games
        timeout-minutes: 360

  news:
    name: Sync News Feeds
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 */4 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'news')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app news
        timeout-minutes: 30

  news-backfill:
    name: Backfill News Game Links (14 Days)
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 3 * * 2' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'news-backfill')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app news-backfill --all --relink --days 14
        timeout-minutes: 90
