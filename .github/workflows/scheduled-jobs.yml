name: Scheduled Jobs

on:
  schedule:
    # Core ingestion (daily)
    - cron: '30 5 * * *'
    # News sync - every 4 hours
    - cron: '0 */4 * * *'
    # News relink backfill (last 14 days) - weekly Tuesday
    - cron: '30 3 * * 2'
    # Disparity (journalists + outlets) - every 12 hours
    - cron: '0 */12 * * *'
    # Disparity (games) - every 12 hours, staggered 30 minutes later
    - cron: '30 */12 * * *'
    # Metacritic recent - daily
    - cron: '0 6 * * *'
    # Metacritic user-count backfill (last 45 days) - weekly Wednesday
    - cron: '0 9 * * 3'
    # Match + Steam refresh - daily
    - cron: '10 7 * * *'
    - cron: '40 7 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        type: choice
        options:
          - sync
          - sync-full
          - news
          - news-backfill
          - disparity-people
          - disparity-games
          - metacritic-recent
          - metacritic-new
          - metacritic-counts-backfill
          - metacritic-catchup
          - match-30d
          - steam-30d
          - match-all
          - match-180d
          - steam-180d
          - steam-all

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  ENVIRONMENT: production

jobs:
  sync:
    name: Sync OpenCritic Games
    runs-on: ubuntu-latest
    concurrency:
      group: opencritic-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event.schedule == '30 5 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Validate OpenCritic API key
        run: |
          if [ -z "${RAPIDAPI_KEY}" ]; then
            echo "::error::RAPIDAPI_KEY secret is missing."
            exit 1
          fi
      - run: pip install -r requirements.txt
      - run: python -u -m app sync --stale-pages 0
        timeout-minutes: 90

  sync-full:
    name: Sync OpenCritic Games (Full Scan)
    runs-on: ubuntu-latest
    concurrency:
      group: opencritic-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-full'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Validate OpenCritic API key
        run: |
          if [ -z "${RAPIDAPI_KEY}" ]; then
            echo "::error::RAPIDAPI_KEY secret is missing."
            exit 1
          fi
      - run: pip install -r requirements.txt
      - run: python -u -m app sync --full-scan
        timeout-minutes: 240

  news:
    name: Sync News Feeds
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 */4 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'news')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app news
        timeout-minutes: 30

  news-backfill:
    name: Backfill News Game Links (14 Days)
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 3 * * 2' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'news-backfill')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app news-backfill --all --relink --days 14
        timeout-minutes: 90

  disparity-people:
    name: Calculate Disparity (Journalists + Outlets)
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 */12 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'disparity-people')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -u -m app disparity --journalists --outlets
        timeout-minutes: 120

  disparity-games:
    name: Calculate Disparity (Games)
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 */12 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'disparity-games')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -u -m app disparity --games
        timeout-minutes: 240

  metacritic-recent:
    name: Sync Metacritic (Last 45 Days)
    runs-on: ubuntu-latest
    concurrency:
      group: metacritic-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'metacritic-recent')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - run: python -u -m app metacritic --recent 45 --limit 300
        timeout-minutes: 120

  metacritic-new:
    name: Sync Metacritic (New Games)
    runs-on: ubuntu-latest
    concurrency:
      group: metacritic-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'metacritic-new'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - run: python -u -m app metacritic --new-only --limit 200
        timeout-minutes: 120

  metacritic-counts-backfill:
    name: Backfill Metacritic User Counts (Last 45 Days)
    runs-on: ubuntu-latest
    concurrency:
      group: metacritic-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event.schedule == '0 9 * * 3' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'metacritic-counts-backfill')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - run: python -u -m app metacritic --backfill-counts --recent 45 --limit 300
        timeout-minutes: 120

  metacritic-catchup:
    name: Sync Metacritic (Global Catch-up)
    runs-on: ubuntu-latest
    concurrency:
      group: metacritic-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'metacritic-catchup'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - run: python -u -m app metacritic --stale-days 7 --limit 400
        timeout-minutes: 240

  match-30d:
    name: Match Games (Last 30 Days)
    runs-on: ubuntu-latest
    concurrency:
      group: steam-match-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event.schedule == '10 7 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'match-30d')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app match --days 30 --limit 300
        timeout-minutes: 120

  steam-30d:
    name: Sync Steam Scores (Last 30 Days)
    runs-on: ubuntu-latest
    concurrency:
      group: steam-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event.schedule == '40 7 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'steam-30d')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app steam --days 30 --limit 500
        timeout-minutes: 120

  match-all:
    name: Match Games (All Unresolved)
    runs-on: ubuntu-latest
    concurrency:
      group: steam-match-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'match-all'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app match --limit 500
        timeout-minutes: 240

  match-180d:
    name: Match Games (Last 180 Days)
    runs-on: ubuntu-latest
    concurrency:
      group: steam-match-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'match-180d'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app match --days 180
        timeout-minutes: 240

  steam-180d:
    name: Sync Steam Scores (Last 180 Days)
    runs-on: ubuntu-latest
    concurrency:
      group: steam-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'steam-180d'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app steam --days 180
        timeout-minutes: 240

  steam-all:
    name: Sync Steam Scores (Global Catch-up)
    runs-on: ubuntu-latest
    concurrency:
      group: steam-sync-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'steam-all'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m app steam --limit 1000
        timeout-minutes: 360
