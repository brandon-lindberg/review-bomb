name: SEO Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/seo-smoke.yml"
  push:
    branches:
      - master
    paths:
      - "frontend/**"
      - ".github/workflows/seo-smoke.yml"

jobs:
  seo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.SEO_API_URL || 'https://reviewdisparity.com/api/v1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Run SEO smoke tests
        working-directory: frontend
        env:
          SEO_BASE_URL: http://127.0.0.1:3000
          SEO_EXPECTED_CANONICAL_ORIGIN: https://reviewdisparity.com
        run: |
          set -euo pipefail
          yarn start -p 3000 > /tmp/next-seo.log 2>&1 &
          NEXT_PID=$!
          trap 'kill $NEXT_PID || true; echo "==== next start log ===="; cat /tmp/next-seo.log || true' EXIT

          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://127.0.0.1:3000/ >/dev/null
          yarn test:seo
